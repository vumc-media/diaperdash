<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diaper Dash Countdown Banner</title>

<style>
:root{
--text:#ffffff;
--muted:rgba(255,255,255,.88);
--panel:rgba(20,24,26,.92);
--panel-border:rgba(255,255,255,.08);
--button-bg:#ffffff;
--button-text:#314041;
--button-hover:#eef3f3;
}

*{box-sizing:border-box;}

html,body{
margin:0;
padding:0;
background:transparent;
font-family:Arial, Helvetica, sans-serif;
overflow:hidden;
}

.banner-shell{
width:100%;
display:flex;
justify-content:center;
align-items:center;
}

.banner{
width:100%;
max-width:1920px;
height:500px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:var(--text);
padding:20px;
}

.content{
width:100%;
max-width:1200px;
display:flex;
flex-direction:column;
align-items:center;
gap:14px;
animation:fadeUp .7s ease-out both;
}

.title{
margin:0;
font-size:clamp(30px,2.2vw,42px);
font-weight:800;
line-height:1.1;
}

.subtitle{
margin:0;
font-size:clamp(16px,1vw,20px);
font-weight:700;
color:var(--muted);
}

.countdown{
display:flex;
gap:14px;
margin-top:4px;
margin-bottom:6px;
}

.box{
width:96px;
padding:12px 10px;
border-radius:12px;
background:var(--panel);
border:1px solid var(--panel-border);
box-shadow:0 6px 16px rgba(0,0,0,.18);
transition:.2s;
}

.box:hover{
transform:translateY(-2px);
}

.number{
font-size:clamp(30px,2vw,38px);
font-weight:800;
animation:pulse 1.2s ease-in-out infinite;
}

.label{
margin-top:6px;
font-size:11px;
text-transform:uppercase;
letter-spacing:.08em;
font-weight:700;
color:rgba(255,255,255,.84);
}

.btn{
display:inline-flex;
align-items:center;
justify-content:center;
min-height:52px;
padding:0 28px;
border-radius:999px;
text-decoration:none;
background:var(--button-bg);
color:var(--button-text);
font-size:16px;
font-weight:800;
box-shadow:0 6px 18px rgba(0,0,0,.14);
transition:.2s;
}

.btn:hover{
background:var(--button-hover);
transform:translateY(-2px);
}

.note{
margin:0;
font-size:clamp(14px,.95vw,17px);
color:var(--muted);
font-weight:700;
}

.hidden{display:none;}

@media (max-width:900px){
.banner{
height:auto;
padding:40px 20px;
}
.countdown{flex-wrap:wrap;justify-content:center;}
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.03);}
}
</style>
</head>

<body>

<div class="banner-shell" id="bannerShell">
<section class="banner">

<div class="content">

<h1 class="title">
Join us for the inaugural Diaper Dash 5K presented by Versailles United Methodist Church!
</h1>

<p class="subtitle">Countdown to Race Day</p>

<div class="countdown">

<div class="box">
<div class="number" id="months">00</div>
<div class="label">Months</div>
</div>

<div class="box">
<div class="number" id="days">00</div>
<div class="label">Days</div>
</div>

<div class="box">
<div class="number" id="hours">00</div>
<div class="label">Hours</div>
</div>

<div class="box">
<div class="number" id="minutes">00</div>
<div class="label">Minutes</div>
</div>

<div class="box">
<div class="number" id="seconds">00</div>
<div class="label">Seconds</div>
</div>

</div>

<a class="btn"
href="https://runsignup.com/Race/KY/Versailles/DiaperDash5KFREEKidSSprint?_gl=1*10039oe*_ga*MTQyMjIwMzY1LjE3NzE1OTY2MTQ.*_ga_QKEVS8BTWC*czE3NzQxMzc5MTYkbzIkZzAkdDE3NzQxMzc5MTYkajYwJGwwJGgw"
target="_blank">
Register Now
</a>

<p class="note">
Saturday, April 25, 2026 • Versailles, Kentucky
</p>

</div>

</section>
</div>

<script>
const raceDate = new Date("2026-04-25T08:30:00-04:00");
const hideAfterRace = true;

function pad(n){return String(n).padStart(2,"0");}

function updateCountdown(){

const now = new Date();
let diff = raceDate - now;

if(diff <= 0){
if(hideAfterRace){
document.getElementById("bannerShell").classList.add("hidden");
return;
}
diff = 0;
}

const totalSeconds = Math.floor(diff/1000);

const seconds = totalSeconds % 60;
const minutes = Math.floor(totalSeconds/60) % 60;
const hours = Math.floor(totalSeconds/3600) % 24;
const daysTotal = Math.floor(totalSeconds/86400);

const months = Math.floor(daysTotal/30);
const days = daysTotal % 30;

document.getElementById("months").textContent = pad(months);
document.getElementById("days").textContent = pad(days);
document.getElementById("hours").textContent = pad(hours);
document.getElementById("minutes").textContent = pad(minutes);
document.getElementById("seconds").textContent = pad(seconds);

}

updateCountdown();
setInterval(updateCountdown,1000);
</script>

</body>
</html>
