<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diaper Dash 5K Countdown</title>
  <style>
    :root{
      --bg:#556566;
      --panel:#222526;
      --text:#ffffff;
      --muted:rgba(255,255,255,.85);
      --button:#ffffff;
      --button-text:#2f3c3d;
      --button-hover:#e9eeee;
    }

    * { box-sizing: border-box; }

    body{
      margin:0;
      min-height:100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .wrap{
      width:100%;
      max-width:1200px;
      text-align:center;
    }

    .intro{
      font-size: clamp(1.4rem, 2.2vw, 2.5rem);
      font-weight:700;
      line-height:1.2;
      max-width:900px;
      margin:0 auto 20px;
    }

    .subhead{
      font-size: clamp(1rem, 1.5vw, 1.25rem);
      font-weight:700;
      margin-bottom:18px;
    }

    .countdown{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:12px;
      margin-bottom:28px;
    }

    .time-box{
      background: var(--panel);
      border-radius:8px;
      padding:10px 12px;
      min-width:92px;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
    }

    .time-value{
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      font-weight:700;
      line-height:1;
      margin-bottom:6px;
      font-variant-numeric: tabular-nums;
    }

    .time-label{
      font-size:.72rem;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.03em;
      color: var(--muted);
      line-height:1.2;
    }

    .actions{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-block;
      text-decoration:none;
      border:none;
      border-radius:999px;
      padding:14px 24px;
      font-size:1rem;
      font-weight:700;
      cursor:pointer;
      transition:transform .15s ease, background .15s ease, opacity .15s ease;
    }

    .btn-primary{
      background: var(--button);
      color: var(--button-text);
    }

    .btn-primary:hover{
      background: var(--button-hover);
      transform: translateY(-1px);
    }

    .event-note{
      margin-top:18px;
      font-size:.95rem;
      color: var(--muted);
    }

    @media (max-width: 640px){
      .time-box{
        min-width:78px;
        padding:10px 10px;
      }

      .intro{
        margin-bottom:16px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="intro">
      Join us for the inaugural Diaper Dash 5K presented by Versailles United Methodist Church!
    </div>

    <div class="subhead">Countdown to Race Day</div>

    <div class="countdown" id="countdown">
      <div class="time-box">
        <div class="time-value" id="months">00</div>
        <div class="time-label">Months</div>
      </div>
      <div class="time-box">
        <div class="time-value" id="days">00</div>
        <div class="time-label">Days</div>
      </div>
      <div class="time-box">
        <div class="time-value" id="hours">00</div>
        <div class="time-label">Hours</div>
      </div>
      <div class="time-box">
        <div class="time-value" id="minutes">00</div>
        <div class="time-label">Minutes</div>
      </div>
      <div class="time-box">
        <div class="time-value" id="seconds">00</div>
        <div class="time-label">Seconds</div>
      </div>
    </div>

    <div class="actions">
      <a
        class="btn btn-primary"
        href="https://runsignup.com/Race/KY/Versailles/DiaperDash5KFREEKidSSprint?_gl=1*10039oe*_ga*MTQyMjIwMzY1LjE3NzE1OTY2MTQ.*_ga_QKEVS8BTWC*czE3NzQxMzc5MTYkbzIkZzAkdDE3NzQxMzc5MTYkajYwJGwwJGgw"
        target="_blank"
        rel="noopener noreferrer"
      >
        Register Now
      </a>
    </div>

    <div class="event-note">
      Saturday, April 25, 2026 • Versailles, Kentucky
    </div>
  </div>

  <script>
    const raceDate = new Date("2026-04-25T08:30:00-04:00");

    const monthsEl = document.getElementById("months");
    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");

    function pad(num) {
      return String(num).padStart(2, "0");
    }

    function calculateCountdown(targetDate) {
      const now = new Date();

      if (now >= targetDate) {
        return {
          months: 0,
          days: 0,
          hours: 0,
          minutes: 0,
          seconds: 0
        };
      }

      let tempDate = new Date(now);
      let months = 0;

      while (true) {
        const nextMonth = new Date(tempDate);
        nextMonth.setMonth(nextMonth.getMonth() + 1);

        if (nextMonth <= targetDate) {
          months++;
          tempDate = nextMonth;
        } else {
          break;
        }
      }

      const remainingMs = targetDate - tempDate;
      const totalSeconds = Math.floor(remainingMs / 1000);

      const days = Math.floor(totalSeconds / (60 * 60 * 24));
      const hours = Math.floor((totalSeconds % (60 * 60 * 24)) / (60 * 60));
      const minutes = Math.floor((totalSeconds % (60 * 60)) / 60);
      const seconds = totalSeconds % 60;

      return { months, days, hours, minutes, seconds };
    }

    function updateCountdown() {
      const time = calculateCountdown(raceDate);

      monthsEl.textContent = pad(time.months);
      daysEl.textContent = pad(time.days);
      hoursEl.textContent = pad(time.hours);
      minutesEl.textContent = pad(time.minutes);
      secondsEl.textContent = pad(time.seconds);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
